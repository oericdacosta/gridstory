# Configuração do PitWall AI

# Diretórios de dados
data:
  raw:
    base_dir: "data/raw"
    races_dir: "data/raw/races"
    calendar_dir: "data/raw/calendar"
  processed:
    base_dir: "data/processed"
  timelines:
    base_dir: "data/timelines"
  models:
    base_dir: "data/models"
  ml:
    races_dir: "data/ml/races"

# Cache do FastF1
cache:
  enabled: true
  dir: "~/.cache/fastf1"  # ~ será expandido para home do usuário

# Extração de dados
extraction:
  # Timeout padrão para download de dados (em segundos)
  timeout: 300

  # Polling para corridas recentes
  polling:
    max_retries: 10
    retry_interval: 300  # 5 minutos em segundos

  # Telemetria
  telemetry:
    # Colunas críticas a extrair
    columns:
      - Time
      - Speed
      - RPM
      - Throttle
      - Brake
      - nGear
      - DRS
      - Distance

# Dados de voltas
laps:
  # Colunas críticas a extrair
  critical_columns:
    - Driver
    - DriverNumber
    - LapNumber
    - Compound
    - TyreLife
    - FreshTyre
    - IsAccurate
    - Stint
    - Team
    - TrackStatus
    - Position

# Clima
weather:
  # Colunas a extrair
  columns:
    - Time
    - AirTemp
    - TrackTemp
    - Rainfall
    - WindSpeed
    - Humidity
    - Pressure

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Pré-processamento
preprocessing:
  # Interpolação de telemetria
  interpolation:
    num_points: 5000  # Número de pontos no grid sincronizado

  # Processamento de sinal
  signal_processing:
    median_filter_kernel_size: 5
    savgol_kernel_size: 11
    savgol_polyorder: 3
    outlier_threshold: 3.0  # Desvios padrão para detecção de outliers

  # Imputação de valores ausentes
  imputation:
    strategy: "median"  # Opções: mean, median, mode, knn
    use_knn: false

  # Codificação de variáveis categóricas
  encoding:
    drop_first: true  # Evitar multicolinearidade em one-hot encoding

  # Escalonamento de features
  scaling:
    type: "robust"  # Opções: standard, minmax, robust

# ML Pipeline
ml:
  # Random state global para reprodutibilidade
  random_state: 42

  # Ruptures - Detecção de degradação
  degradation:
    algorithm: "Pelt"
    model: "l2"           # CostL2: detecta step change de média (tire cliff)
    penalty: 3
    min_size: 3           # mínimo de voltas entre dois breakpoints
    jump: 1               # step do grid de busca
    min_cliff_magnitude: 0.3  # segundos — cliffs com magnitude menor são descartados
                              # magnitude negativa = ficando mais rápido = falso positivo (race start)
    penalty_search_range: [1, 2, 3, 5, 8, 13, 21]  # para calibração via --penalty-search
    warmup_laps_skip: 3   # ML-02: ignorar primeiros N laps do stint (out-lap + aquecimento de pneu)
    validation:
      enabled: true
      window_laps: 5      # laps antes do cliff para calcular slope de degradação
      slope_threshold: 0.05  # segundos/volta — slope mínimo positivo para validar cliff

  # Isolation Forest - Anomalias
  anomaly:
    contamination: 0.05  # Padrão: 5% (RESOLVIDO: era 0.1 no config antigo, 0.05 no código)
    n_estimators: 100
    # ML-03: Contamination adaptativo baseado em eventos reais do race_control
    adaptive_contamination: true   # true = estima contamination de SC/flags; false = usa perfil fixo
    contamination_min: 0.02        # mínimo mesmo em corridas limpas (variância natural)
    contamination_max: 0.12        # máximo para não flagrar tudo como anômalo
    contamination_margin: 0.02     # margem adicional sobre a taxa de eventos
    # Perfis de contaminação por tipo de corrida (usados quando adaptive=false)
    contamination_profiles:
      clean: 0.03      # Corrida limpa, sem incidentes (3%)
      normal: 0.05     # Corrida padrão (5%)
      chaotic: 0.10    # Corrida com muitos safety cars/incidentes (10%)

  # Clustering
  clustering:
    algorithm: "KMeans"
    n_clusters: 3       # Fixo em 3: prior físico F1 (push/base/degraded)
                        # Não usar find_optimal_k() no pipeline — quebra semântica downstream LLM
    k_range_min: 2      # Mínimo de clusters para find_optimal_k() (ferramenta de pesquisa)
    k_range_max: 6      # Máximo de clusters para find_optimal_k() (ferramenta de pesquisa)
    evaluation:
      silhouette_threshold: 0.25   # realista para dados contínuos de F1 (esperado 0.2–0.4)
      davies_bouldin_threshold: 1.5

  # ML-01: Correção de combustível
  fuel:
    correction_enabled: true      # true = aplica correção linear de combustível por stint
    rate_seconds_per_lap: 0.065   # segundos de melhoria por volta queimada (~0.065 s/lap para F1)

  # ML-06: Janela de undercut/overcut
  undercut:
    window_laps: 4                # número de voltas para considerar um undercut (janela após o pit de A)

  # DBSCAN
  dbscan:
    min_samples: 3
    eps: 0.5

# MLFlow
mlflow:
  enabled: true
  tracking_uri: "file:./mlruns"
  experiment_prefix: "F1"  # Experimento: F1_{year}_Round_{round:02d}

# API (futuro)
api:
  host: "0.0.0.0"
  port: 8000
  reload: false

# LLM
llm:
  provider: "groq"                    # LLM-A: groq | openrouter
  model: "llama-3.3-70b-versatile"    # LLM-A: modelo principal
  temperature: 0.3
  max_tokens: 1000
